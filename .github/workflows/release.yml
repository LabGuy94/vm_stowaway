name: release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag name (e.g. v0.1.0)'
        required: true

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: smoke test
        run: make test

      - name: compute tag
        id: tag
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG="$GITHUB_REF_NAME"
            PRE=false
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            PRE=false
          else
            TAG="v0.1.0-$(git rev-parse --short HEAD)"
            PRE=true
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"

      - name: package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          OUT="vm_stowaway-${TAG}-macos-universal"
          mkdir -p "$OUT/bin" "$OUT/lib" "$OUT/include"
          cp build/vm_stowaway "$OUT/bin/"
          cp build/libvm_stowaway.a "$OUT/lib/"
          cp build/libvm_stowaway.dylib "$OUT/lib/"
          cp build/libvm_stowaway_payload.dylib "$OUT/lib/"
          cp build/libvm_stowaway_machshim.dylib "$OUT/lib/"
          cp include/vm_stowaway.h "$OUT/include/"
          cp LICENSE README.md "$OUT/"
          tar czf "$OUT.tar.gz" "$OUT"
          shasum -a 256 "$OUT.tar.gz" > "$OUT.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: vm_stowaway-macos-universal
          path: |
            vm_stowaway-*.tar.gz
            vm_stowaway-*.tar.gz.sha256

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          files: |
            vm_stowaway-*.tar.gz
            vm_stowaway-*.tar.gz.sha256
          generate_release_notes: true
